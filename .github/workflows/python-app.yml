name: CI — Gestor de Gastos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Revisa errores de sintaxis, pero ignora advertencias estéticas menores
          flake8 src/ tests/ --max-line-length=88 --statistics

      - name: Run unit tests with coverage
        run: |
          # Definimos PYTHONPATH=. para que reconozca la carpeta 'src'
          PYTHONPATH=. pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Run integration tests
        run: |
          # Corre el flujo completo de la app
          PYTHONPATH=. pytest tests/integration/ -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: |
            coverage.xml
          retention-days: 7
