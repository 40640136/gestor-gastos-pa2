name: CI — Gestor de Gastos Completo

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov sqlalchemy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 1. Lint with flake8 (Calidad de Código)
        run: |
          # Solo errores críticos para asegurar el verde
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 2. Run Unit Tests & Coverage (TDD)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: 3. Run Integration Tests (Flujo Completo)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/integration/ -v
