name: CI — Gestor de Gastos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Cambiamos la forma de llamar a flake8 para que no de error de modulo
          python -m flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests with coverage
        run: |
          # Forzamos el PYTHONPATH directamente en el comando
          PYTHONPATH=.:src pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v

      - name: Run integration tests
        run: |
          PYTHONPATH=.:src pytest tests/integration/ -v
