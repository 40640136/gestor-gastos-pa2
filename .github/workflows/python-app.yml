name: CI — Gestor de Gastos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"] # Usamos solo la 3.11 para que sea más rápido

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Solo revisamos errores críticos, ignorando estilo para que pase en verde
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Ejecutamos los tests apuntando a la raíz del proyecto
          pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/integration/ -v
